<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>小鹏语音助手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  color:#fff;display:flex;flex-direction:column;align-items:center;
}
.conversation{
  flex:1;width:100%;max-width:500px;overflow-y:auto;padding:16px;
  display:flex;flex-direction:column;gap:12px;
}
.msg{max-width:85%;padding:12px 16px;border-radius:18px;line-height:1.5;word-break:break-word;font-size:15px}
.msg.user{align-self:flex-end;background:#4f46e5;color:#fff;border-bottom-right-radius:4px}
.msg.assistant{align-self:flex-start;background:#1e1b4b;color:#e2e8f0;border-bottom-left-radius:4px}
.msg.assistant.speaking{border:2px solid #818cf8;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{border-color:#818cf8}50%{border-color:#c4b5fd}}

.controls{
  width:100%;max-width:500px;padding:20px;display:flex;flex-direction:column;
  align-items:center;gap:16px;
}
.hold-btn{
  width:130px;height:130px;border-radius:50%;border:none;
  background:linear-gradient(135deg,#4f46e5,#7c3aed);
  color:#fff;font-size:15px;font-weight:600;cursor:pointer;
  box-shadow:0 8px 32px rgba(79,70,229,0.4);
  transition:all 0.3s;display:flex;align-items:center;justify-content:center;
  user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;
  touch-action:manipulation;text-align:center;line-height:1.4;
}
.hold-btn.active{
  background:linear-gradient(135deg,#10b981,#059669);
  box-shadow:0 8px 40px rgba(16,185,129,0.5);
  animation:breathe 2s ease-in-out infinite;
}
.hold-btn.thinking{
  background:linear-gradient(135deg,#f59e0b,#d97706);
  box-shadow:0 8px 40px rgba(245,158,11,0.5);
}
@keyframes breathe{0%,100%{transform:scale(1);box-shadow:0 8px 40px rgba(16,185,129,0.3)}50%{transform:scale(1.05);box-shadow:0 8px 60px rgba(16,185,129,0.6)}}
.hold-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;animation:none}

.hint{font-size:13px;color:#999;text-align:center;min-height:20px;transition:color 0.3s}
.hint.active{color:#10b981}

.api-section{
  width:100%;max-width:500px;padding:16px 20px;display:flex;gap:8px;
}
.api-section input{
  flex:1;padding:10px 14px;border-radius:20px;border:none;
  background:#1e1b4b;color:#fff;font-size:14px;outline:none;
}
.api-section input::placeholder{color:#666}
.api-section button{
  padding:10px 20px;border-radius:20px;border:none;
  background:#4f46e5;color:#fff;font-size:14px;cursor:pointer;white-space:nowrap;
}

.top-bar{
  width:100%;max-width:500px;padding:12px 16px;
  display:flex;justify-content:flex-end;align-items:center;gap:8px;
}
.top-bar button{
  background:none;border:1px solid #444;color:#999;padding:6px 14px;
  border-radius:14px;font-size:12px;cursor:pointer;
}
.status-dot{
  width:8px;height:8px;border-radius:50%;background:#ef4444;margin-right:4px;
}
.status-dot.active{background:#10b981;animation:pulse2 1.5s infinite}
@keyframes pulse2{0%,100%{opacity:1}50%{opacity:0.3}}
</style>
</head>
<body>

<div class="top-bar">
  <span class="status-dot" id="statusDot"></span>
  <span style="font-size:12px;color:#999;margin-right:auto" id="statusText">未连接</span>
  <button id="clearBtn">清空对话</button>
  <button id="testVoice">测试声音</button>
</div>

<div class="api-section" id="apiSection">
  <input type="password" id="apiKey" placeholder="输入 DeepSeek API Key (sk-...)">
  <button id="saveKey">保存</button>
</div>

<div class="conversation" id="conversation">
  <div class="msg assistant">
    老大好！我是小鹏。<br>点下方按钮开始对话，说完后我会自动回复。
  </div>
</div>

<div class="controls">
  <button class="hold-btn" id="holdBtn">开始<br>对话</button>
  <div class="hint" id="hint">点击按钮开始实时对话</div>
</div>

<script>
const STATE = {
  apiKey: localStorage.getItem('xp_api_key') || '',
  tts: localStorage.getItem('xp_tts') || 'browser',
  active: false,
  listening: false,
  speaking: false,
  recognition: null,
  silenceTimer: null,
};

const conv = document.getElementById('conversation');
const holdBtn = document.getElementById('holdBtn');
const hint = document.getElementById('hint');
const apiKeyInput = document.getElementById('apiKey');
const ttsSelect = document.getElementById('ttsSelect');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');

// 初始化
if (STATE.apiKey) {
  document.getElementById('apiSection').style.display = 'none';
  apiKeyInput.value = STATE.apiKey;
}

document.getElementById('saveKey').addEventListener('click', () => {
  const key = apiKeyInput.value.trim();
  if (!key.startsWith('sk-')) return alert('API Key 格式不对，应该以 sk- 开头');
  STATE.apiKey = key;
  localStorage.setItem('xp_api_key', key);
  document.getElementById('apiSection').style.display = 'none';
  addMsg('assistant', 'Key 已保存，老大点按钮开始对话吧 🎤');
});

document.getElementById('clearBtn').addEventListener('click', () => {
  conv.innerHTML = '';
  addMsg('assistant', '对话已清空，老大请说～');
});

document.getElementById('testVoice').addEventListener('click', () => {
  const testText = '老大你好，我是小鹏，声音测试成功。';
  addMsg('assistant', testText);
  // 用 setTimeout 确保 iOS 能播放
  setTimeout(() => {
    const u = new SpeechSynthesisUtterance(testText);
    u.lang = 'zh-CN';
    u.rate = 1.0;
    u.volume = 1;
    speechSynthesis.speak(u);
  }, 100);
});

// 语音识别
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if (!SpeechRecognition) {
  holdBtn.disabled = true;
  hint.textContent = '⚠️ 当前浏览器不支持语音，请用 Safari 或 Chrome 打开';
}

function startListening() {
  if (STATE.speaking) return;

  STATE.recognition = new SpeechRecognition();
  STATE.recognition.lang = 'zh-CN';
  STATE.recognition.interimResults = true;
  STATE.recognition.continuous = true;
  STATE.listening = true;

  updateUI('listening');

  let finalText = '';

  STATE.recognition.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        finalText += e.results[i][0].transcript;
      } else {
        interim += e.results[i][0].transcript;
      }
    }
    hint.textContent = finalText || interim || '🎤 正在听...';

    clearTimeout(STATE.silenceTimer);
    STATE.silenceTimer = setTimeout(() => {
      if (STATE.listening && finalText.trim()) {
        stopAndSend(finalText.trim());
      }
    }, 1500);
  };

  STATE.recognition.onerror = (e) => {
    if (e.error === 'no-speech') {
      if (STATE.active) {
        // 对话模式：自动重新听
        setTimeout(() => { if (STATE.active && !STATE.speaking) restartListen(); }, 500);
      }
    } else if (e.error !== 'aborted') {
      hint.textContent = '⚠️ ' + e.error;
      if (STATE.active) {
        setTimeout(() => { if (STATE.active && !STATE.speaking) restartListen(); }, 1000);
      }
    }
  };

  STATE.recognition.onend = () => {
    if (STATE.listening && finalText.trim()) {
      stopAndSend(finalText.trim());
    } else if (STATE.active && !STATE.speaking) {
      restartListen();
    }
  };

  STATE.recognition.start();
}

function restartListen() {
  try {
    if (STATE.recognition) STATE.recognition.abort();
  } catch(e) {}
  STATE.listening = false;
  setTimeout(() => {
    if (STATE.active && !STATE.speaking) startListening();
  }, 300);
}

function stopAndSend(text) {
  STATE.listening = false;
  try { STATE.recognition.stop(); } catch(e) {}
  addMsg('user', text);
  sendToAI(text);
}

// 消息
function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  conv.appendChild(div);
  conv.scrollTop = conv.scrollHeight;
  return div;
}

// AI
async function sendToAI(text) {
  const msgDiv = addMsg('assistant', '...');
  updateUI('thinking');

  try {
    const resp = await fetch('https://api.deepseek.com/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + STATE.apiKey },
      body: JSON.stringify({
        model: 'deepseek-chat',
        messages: [
          { role: 'system', content: '你是小鹏，老大的专属全能AI助理。认真细致、靠谱踏实。用简体中文回复，称呼用户为"老大"。回复简短精炼适合语音播报，控制在2-4句话，不要列表编号Markdown，像打电话聊天一样自然。' },
          { role: 'user', content: text }
        ],
        max_tokens: 300, temperature: 0.7,
      }),
    });

    const data = await resp.json();
    const reply = data.choices?.[0]?.message?.content || '抱歉老大，脑子卡了一下...';
    msgDiv.textContent = reply;
    speak(reply, msgDiv);
  } catch (e) {
    msgDiv.textContent = '网络出问题了老大，检查一下 API Key 吧';
    updateUI('active');
    setTimeout(() => { if (STATE.active) startListening(); }, 1000);
  }
}

// TTS 语音输出
function speak(text, msgDiv) {
  STATE.speaking = true;
  updateUI('speaking');
  if (msgDiv) msgDiv.classList.add('speaking');

  // 用 setTimeout 脱离异步上下文，兼容 iOS
  setTimeout(() => {
    speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'zh-CN';
    utter.rate = 1.1;
    utter.volume = 1;

    utter.onend = () => {
      STATE.speaking = false;
      if (msgDiv) msgDiv.classList.remove('speaking');
      if (STATE.active) {
        setTimeout(() => startListening(), 500);
      } else {
        updateUI('idle');
      }
    };

    utter.onerror = () => {
      STATE.speaking = false;
      if (msgDiv) msgDiv.classList.remove('speaking');
      if (STATE.active) {
        setTimeout(() => startListening(), 500);
      }
    };

    speechSynthesis.speak(utter);
  }, 50);
}

// UI 状态更新
function updateUI(state) {
  switch(state) {
    case 'idle':
      holdBtn.classList.remove('active', 'thinking');
      holdBtn.innerHTML = '开始<br>对话';
      hint.textContent = '点击按钮开始实时对话';
      hint.classList.remove('active');
      statusDot.classList.remove('active');
      statusText.textContent = '未连接';
      break;
    case 'active':
      holdBtn.classList.add('active');
      holdBtn.classList.remove('thinking');
      holdBtn.innerHTML = '对话中<br>点击结束';
      hint.textContent = '对话已开启，直接说话就好';
      hint.classList.add('active');
      statusDot.classList.add('active');
      statusText.textContent = '已连接';
      break;
    case 'listening':
      holdBtn.classList.add('active');
      holdBtn.classList.remove('thinking');
      hint.textContent = '🎤 正在听...';
      hint.classList.add('active');
      break;
    case 'thinking':
      holdBtn.classList.add('active', 'thinking');
      hint.textContent = '小鹏正在思考...';
      hint.classList.add('active');
      break;
    case 'speaking':
      holdBtn.classList.add('active');
      holdBtn.classList.remove('thinking');
      hint.textContent = '🔊 小鹏正在说...';
      hint.classList.add('active');
      break;
  }
}

// 按钮：开始/结束对话
holdBtn.addEventListener('click', () => {
  if (!STATE.apiKey) { alert('请先填入 DeepSeek API Key'); return; }

  if (STATE.active) {
    // 结束对话
    STATE.active = false;
    try { STATE.recognition.abort(); STATE.recognition.stop(); } catch(e) {}
    speechSynthesis.cancel();
    STATE.listening = false;
    STATE.speaking = false;
    updateUI('idle');
  } else {
    // 开始对话 - 解锁 iOS 语音
    if (typeof speechSynthesis !== 'undefined') {
      // iOS 必须用真实点击触发第一次 speak
      const unlock = new SpeechSynthesisUtterance(' ');
      unlock.volume = 0;
      speechSynthesis.speak(unlock);
      loadVoices();
    }
    // 开始对话
    STATE.active = true;
    updateUI('active');
    setTimeout(() => startListening(), 500);
  }
});

// 预加载语音 - 在第一次点击时加载
let voicesLoaded = false;
function loadVoices() {
  if (voicesLoaded) return;
  voicesLoaded = true;
  const v = speechSynthesis.getVoices();
  if (v.length === 0) {
    // iOS 需要先 speak 一个空内容来触发加载
    const dummy = new SpeechSynthesisUtterance('');
    dummy.volume = 0;
    speechSynthesis.speak(dummy);
  }
}
</script>
</body>
</html>
