<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>小鹏语音助手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  color:#fff;display:flex;flex-direction:column;align-items:center;
}
.conversation{
  flex:1;width:100%;max-width:500px;overflow-y:auto;padding:16px;
  display:flex;flex-direction:column;gap:12px;
}
.msg{max-width:85%;padding:12px 16px;border-radius:18px;line-height:1.5;word-break:break-word;font-size:15px}
.msg.user{align-self:flex-end;background:#4f46e5;color:#fff;border-bottom-right-radius:4px}
.msg.assistant{align-self:flex-start;background:#1e1b4b;color:#e2e8f0;border-bottom-left-radius:4px}
.msg.assistant.speaking{border:2px solid #818cf8;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{border-color:#818cf8}50%{border-color:#c4b5fd}}

.controls{
  width:100%;max-width:500px;padding:20px;display:flex;flex-direction:column;
  align-items:center;gap:16px;
}
.hold-btn{
  width:120px;height:120px;border-radius:50%;border:none;
  background:linear-gradient(135deg,#4f46e5,#7c3aed);
  color:#fff;font-size:15px;font-weight:600;cursor:pointer;
  box-shadow:0 8px 32px rgba(79,70,229,0.4);
  transition:all 0.2s;display:flex;align-items:center;justify-content:center;
  user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.hold-btn:active,.hold-btn.listening{
  transform:scale(1.08);background:linear-gradient(135deg,#ef4444,#dc2626);
  box-shadow:0 8px 40px rgba(239,68,68,0.5);
}
.hold-btn.listening{animation:breathe 1.5s ease-in-out infinite}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.hold-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;animation:none}

.hint{font-size:13px;color:#999;text-align:center;min-height:20px}

.api-section{
  width:100%;max-width:500px;padding:16px 20px;display:flex;gap:8px;
}
.api-section input{
  flex:1;padding:10px 14px;border-radius:20px;border:none;
  background:#1e1b4b;color:#fff;font-size:14px;outline:none;
}
.api-section input::placeholder{color:#666}
.api-section button{
  padding:10px 20px;border-radius:20px;border:none;
  background:#4f46e5;color:#fff;font-size:14px;cursor:pointer;white-space:nowrap;
}

.top-bar{
  width:100%;max-width:500px;padding:12px 16px;
  display:flex;justify-content:flex-end;align-items:center;gap:8px;
}
.top-bar button{
  background:none;border:1px solid #444;color:#999;padding:6px 14px;
  border-radius:14px;font-size:12px;cursor:pointer;
}
.tts-select{
  background:#1e1b4b;border:1px solid #444;color:#ccc;
  padding:6px 12px;border-radius:14px;font-size:12px;outline:none;
}
</style>
</head>
<body>

<div class="top-bar">
  <select class="tts-select" id="ttsSelect">
    <option value="browser">语音引擎：浏览器</option>
    <option value="openai">语音引擎：OpenAI</option>
  </select>
  <button id="clearBtn">清空对话</button>
</div>

<div class="api-section" id="apiSection">
  <input type="password" id="apiKey" placeholder="输入 OpenAI API Key (sk-...)">
  <button id="saveKey">保存</button>
</div>

<div class="conversation" id="conversation">
  <div class="msg assistant">
    老大好！我是小鹏。<br>按住下方按钮说话，松开后我会语音回复你。
  </div>
</div>

<div class="controls">
  <button class="hold-btn" id="holdBtn">按住说话</button>
  <div class="hint" id="hint">按住说话，松开发送</div>
</div>

<script>
const STATE = {
  apiKey: localStorage.getItem('xp_api_key') || '',
  tts: localStorage.getItem('xp_tts') || 'browser',
  listening: false,
  speaking: false,
  recognition: null,
  silenceTimer: null,
};

const conv = document.getElementById('conversation');
const holdBtn = document.getElementById('holdBtn');
const hint = document.getElementById('hint');
const apiKeyInput = document.getElementById('apiKey');
const ttsSelect = document.getElementById('ttsSelect');

// 初始化
if (STATE.apiKey) {
  document.getElementById('apiSection').style.display = 'none';
  apiKeyInput.value = STATE.apiKey;
}
ttsSelect.value = STATE.tts;

ttsSelect.addEventListener('change', () => {
  STATE.tts = ttsSelect.value;
  localStorage.setItem('xp_tts', STATE.tts);
});

document.getElementById('saveKey').addEventListener('click', () => {
  const key = apiKeyInput.value.trim();
  if (!key.startsWith('sk-')) return alert('API Key 格式不对，应该以 sk- 开头');
  STATE.apiKey = key;
  localStorage.setItem('xp_api_key', key);
  document.getElementById('apiSection').style.display = 'none';
  addMsg('assistant', 'API Key 已保存，老大现在可以按住说话了 🎤');
});

document.getElementById('clearBtn').addEventListener('click', () => {
  const welcome = document.querySelector('.msg.assistant');
  conv.innerHTML = '';
  if (welcome) conv.appendChild(welcome);
});

// 语音识别
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if (!SpeechRecognition) {
  holdBtn.disabled = true;
  hint.textContent = '⚠️ 当前浏览器不支持语音，请用 Safari 或 Chrome 打开';
}

function startListening() {
  if (!STATE.apiKey) { alert('请先填入 OpenAI API Key'); return; }
  if (STATE.speaking) { hint.textContent = '等我讲完再说～'; return; }

  STATE.recognition = new SpeechRecognition();
  STATE.recognition.lang = 'zh-CN';
  STATE.recognition.interimResults = true;
  STATE.recognition.continuous = true;
  STATE.listening = true;

  holdBtn.classList.add('listening');
  holdBtn.textContent = '松开发送';
  hint.textContent = '🎤 正在听...';

  let finalText = '';

  STATE.recognition.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        finalText += e.results[i][0].transcript;
      } else {
        interim += e.results[i][0].transcript;
      }
    }
    hint.textContent = finalText || interim || '🎤 正在听...';

    clearTimeout(STATE.silenceTimer);
    STATE.silenceTimer = setTimeout(() => {
      if (STATE.listening && finalText.trim()) stopAndSend(finalText.trim());
    }, 2000);
  };

  STATE.recognition.onerror = (e) => {
    if (e.error === 'no-speech') hint.textContent = '没听到声音，再试一次？';
    else if (e.error !== 'aborted') hint.textContent = '⚠️ ' + e.error;
    resetBtn();
  };

  STATE.recognition.onend = () => {
    if (STATE.listening && finalText.trim()) stopAndSend(finalText.trim());
  };

  STATE.recognition.start();
}

function stopAndSend(text) {
  STATE.listening = false;
  if (STATE.recognition) { try { STATE.recognition.stop(); } catch(e) {} }
  resetBtn();
  addMsg('user', text);
  sendToAI(text);
}

function resetBtn() {
  STATE.listening = false;
  holdBtn.classList.remove('listening');
  holdBtn.textContent = '按住说话';
  clearTimeout(STATE.silenceTimer);
}

// 消息
function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  conv.appendChild(div);
  conv.scrollTop = conv.scrollHeight;
  return div;
}

// AI
async function sendToAI(text) {
  const msgDiv = addMsg('assistant', '...');
  hint.textContent = '小鹏正在思考...';

  try {
    const resp = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + STATE.apiKey },
      body: JSON.stringify({
        model: 'gpt-4.5-preview',
        messages: [
          { role: 'system', content: '你是小鹏，老大的专属全能AI助理。认真细致、靠谱踏实。用简体中文回复，称呼用户为"老大"。回复简短精炼适合语音播报，控制在2-4句话，不要列表编号Markdown，像打电话聊天一样自然。' },
          { role: 'user', content: text }
        ],
        max_tokens: 300, temperature: 0.7,
      }),
    });

    const data = await resp.json();
    const reply = data.choices?.[0]?.message?.content || '抱歉老大，脑子卡了一下...';
    msgDiv.textContent = reply;
    hint.textContent = '';
    speak(reply, msgDiv);
  } catch (e) {
    msgDiv.textContent = '网络出问题了老大，检查翻墙和 API Key 吧';
    hint.textContent = '❌ 请求失败';
  }
}

// TTS
function speak(text, msgDiv) {
  STATE.speaking = true;
  if (msgDiv) msgDiv.classList.add('speaking');
  hint.textContent = '🔊 小鹏正在说...';

  if (STATE.tts === 'openai') {
    speakOpenAI(text, msgDiv);
  } else {
    speakBrowser(text, msgDiv);
  }
}

function speakBrowser(text, msgDiv) {
  speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'zh-CN';
  utter.rate = 1.1;
  const voices = speechSynthesis.getVoices();
  const zh = voices.filter(v => v.lang.startsWith('zh'));
  if (zh.length) utter.voice = zh.find(v => v.name.includes('Tingting') || v.name.includes('Xiaoyi')) || zh[0];

  utter.onend = () => { STATE.speaking = false; if (msgDiv) msgDiv.classList.remove('speaking'); hint.textContent = '按住说话，松开发送'; };
  utter.onerror = () => { STATE.speaking = false; if (msgDiv) msgDiv.classList.remove('speaking'); hint.textContent = '按住说话，松开发送'; };
  speechSynthesis.speak(utter);
}

async function speakOpenAI(text, msgDiv) {
  try {
    const resp = await fetch('https://api.openai.com/v1/audio/speech', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + STATE.apiKey },
      body: JSON.stringify({ model: 'tts-1', voice: 'alloy', input: text, speed: 1.1 }),
    });
    const blob = await resp.blob();
    const audio = new Audio(URL.createObjectURL(blob));
    audio.onended = () => { STATE.speaking = false; if (msgDiv) msgDiv.classList.remove('speaking'); hint.textContent = '按住说话，松开发送'; };
    audio.onerror = () => { STATE.speaking = false; if (msgDiv) msgDiv.classList.remove('speaking'); hint.textContent = '按住说话，松开发送'; };
    audio.play();
  } catch (e) {
    STATE.speaking = false; if (msgDiv) msgDiv.classList.remove('speaking');
    hint.textContent = '按住说话，松开发送';
  }
}

// 按住说话
holdBtn.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  if (!STATE.apiKey) { alert('请先填入 OpenAI API Key'); return; }
  startListening();
});
holdBtn.addEventListener('pointerup', (e) => {
  e.preventDefault();
  if (STATE.listening) { STATE.listening = false; try { STATE.recognition.stop(); } catch(e) {} resetBtn(); }
});
holdBtn.addEventListener('pointerleave', () => {
  if (STATE.listening) { STATE.listening = false; try { STATE.recognition.stop(); } catch(e) {} resetBtn(); }
});

// 预加载语音
if (typeof speechSynthesis !== 'undefined') {
  speechSynthesis.getVoices();
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}
</script>
</body>
</html>
