<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>小鹏语音助手</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  color:#fff;display:flex;flex-direction:column;align-items:center;
}
.conversation{
  flex:1;width:100%;max-width:500px;overflow-y:auto;padding:16px;
  display:flex;flex-direction:column;gap:12px;
}
.msg{max-width:85%;padding:12px 16px;border-radius:18px;line-height:1.5;word-break:break-word;font-size:15px}
.msg.user{align-self:flex-end;background:#4f46e5;color:#fff;border-bottom-right-radius:4px}
.msg.assistant{align-self:flex-start;background:#1e1b4b;color:#e2e8f0;border-bottom-left-radius:4px}
.msg.assistant.speaking{border:2px solid #818cf8;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{border-color:#818cf8}50%{border-color:#c4b5fd}}

.controls{
  width:100%;max-width:500px;padding:20px;display:flex;flex-direction:column;
  align-items:center;gap:16px;
}
.hold-btn{
  width:130px;height:130px;border-radius:50%;border:none;
  background:linear-gradient(135deg,#4f46e5,#7c3aed);
  color:#fff;font-size:15px;font-weight:600;cursor:pointer;
  box-shadow:0 8px 32px rgba(79,70,229,0.4);
  transition:all 0.3s;display:flex;align-items:center;justify-content:center;
  user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;
  touch-action:manipulation;text-align:center;line-height:1.4;
}
.hold-btn.active{
  background:linear-gradient(135deg,#10b981,#059669);
  box-shadow:0 8px 40px rgba(16,185,129,0.5);
  animation:breathe 2s ease-in-out infinite;
}
.hold-btn.thinking{
  background:linear-gradient(135deg,#f59e0b,#d97706);
  box-shadow:0 8px 40px rgba(245,158,11,0.5);
}
@keyframes breathe{0%,100%{transform:scale(1);box-shadow:0 8px 40px rgba(16,185,129,0.3)}50%{transform:scale(1.05);box-shadow:0 8px 60px rgba(16,185,129,0.6)}}
.hold-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;animation:none}

.hint{font-size:13px;color:#999;text-align:center;min-height:20px;transition:color 0.3s}
.hint.active{color:#10b981}

.api-section{
  width:100%;max-width:500px;padding:16px 20px;display:flex;flex-direction:column;gap:8px;
}
.api-section input{
  flex:1;padding:10px 14px;border-radius:20px;border:none;
  background:#1e1b4b;color:#fff;font-size:14px;outline:none;width:100%;
}
.api-section input::placeholder{color:#666}
.api-section .btn-row{display:flex;gap:8px}
.api-section button{
  flex:1;padding:10px 20px;border-radius:20px;border:none;
  background:#4f46e5;color:#fff;font-size:14px;cursor:pointer;white-space:nowrap;
}

.top-bar{
  width:100%;max-width:500px;padding:12px 16px;
  display:flex;justify-content:flex-end;align-items:center;gap:6px;
}
.top-bar button{
  background:none;border:1px solid #444;color:#999;padding:6px 12px;
  border-radius:14px;font-size:11px;cursor:pointer;
}
.status-dot{
  width:8px;height:8px;border-radius:50%;background:#ef4444;margin-right:4px;
}
.status-dot.active{background:#10b981;animation:pulse2 1.5s infinite}
@keyframes pulse2{0%,100%{opacity:1}50%{opacity:0.3}}
</style>
</head>
<body>

<div class="top-bar">
  <span class="status-dot" id="statusDot"></span>
  <span style="font-size:12px;color:#999;margin-right:auto" id="statusText">未连接</span>
  <button id="clearBtn">新对话</button>
  <button id="testVoice">测试声音</button>
</div>

<div class="api-section" id="apiSection">
  <input type="password" id="apiKey" placeholder="DeepSeek API Key (sk-...)">
  <input type="password" id="sfKey" placeholder="硅基流动 Key（可选，声音更好听）">
  <div class="btn-row">
    <button id="saveKey">保存</button>
  </div>
</div>

<div class="conversation" id="conversation">
  <div class="msg assistant">
    老大好！我是小鹏。<br>点下方按钮开始对话，我会记住上下文，像打电话一样自然聊天。
  </div>
</div>

<div class="controls">
  <button class="hold-btn" id="holdBtn">开始<br>对话</button>
  <div class="hint" id="hint">点击按钮开始实时对话</div>
</div>

<script>
const STATE = {
  apiKey: localStorage.getItem('xp_api_key') || '',
  sfKey: localStorage.getItem('xp_sf_key') || '',
  active: false,
  listening: false,
  speaking: false,
  recognition: null,
  silenceTimer: null,
  history: [],
};

const SYSTEM_PROMPT = '你是小鹏，老大的专属全能AI助理。认真细致、靠谱踏实。用简体中文回复，称呼用户为"老大"。回复简短精炼适合语音播报，控制在2-4句话，不要列表编号Markdown，像打电话聊天一样自然。记住之前的对话内容，保持连贯。';

const conv = document.getElementById('conversation');
const holdBtn = document.getElementById('holdBtn');
const hint = document.getElementById('hint');
const apiKeyInput = document.getElementById('apiKey');
const sfKeyInput = document.getElementById('sfKey');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');

if (STATE.apiKey) apiKeyInput.value = STATE.apiKey;
if (STATE.sfKey) sfKeyInput.value = STATE.sfKey;
if (STATE.apiKey) document.getElementById('apiSection').style.display = 'none';

document.getElementById('saveKey').addEventListener('click', () => {
  const k = apiKeyInput.value.trim();
  const sf = sfKeyInput.value.trim();
  if (!k.startsWith('sk-')) return alert('DeepSeek Key 格式不对');
  STATE.apiKey = k;
  STATE.sfKey = sf;
  localStorage.setItem('xp_api_key', k);
  localStorage.setItem('xp_sf_key', sf);
  document.getElementById('apiSection').style.display = 'none';
  addMsg('assistant', 'Key 已保存。老大，点按钮开始对话吧！');
});

document.getElementById('clearBtn').addEventListener('click', () => {
  STATE.history = [];
  conv.innerHTML = '';
  addMsg('assistant', '新对话，老大请说～');
});

document.getElementById('testVoice').addEventListener('click', () => {
  doSpeak('老大你好，我是小鹏，声音测试成功。');
});

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if (!SpeechRecognition) {
  holdBtn.disabled = true;
  hint.textContent = '⚠️ 请用 Safari 或 Chrome 打开';
}

function startListening() {
  if (STATE.speaking) return;
  STATE.recognition = new SpeechRecognition();
  STATE.recognition.lang = 'zh-CN';
  STATE.recognition.interimResults = true;
  STATE.recognition.continuous = true;
  STATE.listening = true;
  updateUI('listening');
  let finalText = '';

  STATE.recognition.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) finalText += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    hint.textContent = finalText || interim || '🎤 正在听...';
    clearTimeout(STATE.silenceTimer);
    STATE.silenceTimer = setTimeout(() => {
      if (STATE.listening && finalText.trim()) stopAndSend(finalText.trim());
    }, 1500);
  };

  STATE.recognition.onerror = (e) => {
    if (e.error === 'no-speech') {
      if (STATE.active) setTimeout(() => { if (STATE.active && !STATE.speaking) restartListen(); }, 500);
    } else if (e.error !== 'aborted') {
      hint.textContent = '⚠️ ' + e.error;
      if (STATE.active) setTimeout(() => { if (STATE.active && !STATE.speaking) restartListen(); }, 1000);
    }
  };

  STATE.recognition.onend = () => {
    if (STATE.listening && finalText.trim()) stopAndSend(finalText.trim());
    else if (STATE.active && !STATE.speaking) restartListen();
  };

  STATE.recognition.start();
}

function restartListen() {
  try { if (STATE.recognition) STATE.recognition.abort(); } catch(e) {}
  STATE.listening = false;
  setTimeout(() => { if (STATE.active && !STATE.speaking) startListening(); }, 300);
}

function stopAndSend(text) {
  STATE.listening = false;
  try { STATE.recognition.stop(); } catch(e) {}
  addMsg('user', text);
  sendToAI(text);
}

function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  conv.appendChild(div);
  conv.scrollTop = conv.scrollHeight;
  return div;
}

async function sendToAI(text) {
  const msgDiv = addMsg('assistant', '...');
  updateUI('thinking');

  STATE.history.push({ role: 'user', content: text });
  if (STATE.history.length > 30) STATE.history = STATE.history.slice(-30);

  const messages = [{ role: 'system', content: SYSTEM_PROMPT }, ...STATE.history];

  try {
    const resp = await fetch('https://api.deepseek.com/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + STATE.apiKey },
      body: JSON.stringify({ model: 'deepseek-chat', messages, max_tokens: 300, temperature: 0.7 }),
    });
    const data = await resp.json();
    const reply = data.choices?.[0]?.message?.content || '抱歉老大，脑子卡了一下...';
    STATE.history.push({ role: 'assistant', content: reply });
    if (STATE.history.length > 30) STATE.history = STATE.history.slice(-30);
    msgDiv.textContent = reply;
    doSpeak(reply, msgDiv);
  } catch (e) {
    msgDiv.textContent = '网络出问题了老大，检查 API Key';
    updateUI('active');
    setTimeout(() => { if (STATE.active) startListening(); }, 1000);
  }
}

async function doSpeak(text, msgDiv) {
  STATE.speaking = true;
  updateUI('speaking');
  if (msgDiv) msgDiv.classList.add('speaking');

  if (STATE.sfKey) {
    try {
      const ttsResp = await fetch('https://api.siliconflow.cn/v1/audio/speech', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + STATE.sfKey },
        body: JSON.stringify({ model: 'FunAudioLLM/CosyVoice2-0.5B', input: text, voice: 'FunAudioLLM/CosyVoice2-0.5B:alex', response_format: 'mp3', speed: 1.1 }),
      });
      if (ttsResp.ok) {
        const blob = await ttsResp.blob();
        const audio = new Audio(URL.createObjectURL(blob));
        audio.onended = () => onSpeakEnd(msgDiv);
        audio.onerror = () => onSpeakEnd(msgDiv);
        audio.play();
        return;
      }
    } catch(e) {}
  }

  setTimeout(() => {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'zh-CN';
    u.rate = 1.05;
    u.volume = 1;
    u.onend = () => onSpeakEnd(msgDiv);
    u.onerror = () => onSpeakEnd(msgDiv);
    speechSynthesis.speak(u);
  }, 50);
}

function onSpeakEnd(msgDiv) {
  STATE.speaking = false;
  if (msgDiv) msgDiv.classList.remove('speaking');
  if (STATE.active) setTimeout(() => startListening(), 500);
  else updateUI('idle');
}

function updateUI(state) {
  switch(state) {
    case 'idle':
      holdBtn.classList.remove('active', 'thinking');
      holdBtn.innerHTML = '开始<br>对话';
      hint.textContent = '点击按钮开始实时对话';
      hint.classList.remove('active');
      statusDot.classList.remove('active');
      statusText.textContent = '未连接';
      break;
    case 'active':
      holdBtn.classList.add('active'); holdBtn.classList.remove('thinking');
      holdBtn.innerHTML = '对话中<br>点击结束';
      hint.textContent = '对话已开启，直接说话就好';
      hint.classList.add('active');
      statusDot.classList.add('active'); statusText.textContent = '已连接';
      break;
    case 'listening':
      holdBtn.classList.add('active'); holdBtn.classList.remove('thinking');
      hint.textContent = '🎤 正在听...'; hint.classList.add('active');
      break;
    case 'thinking':
      holdBtn.classList.add('active', 'thinking');
      hint.textContent = '小鹏正在思考...'; hint.classList.add('active');
      break;
    case 'speaking':
      holdBtn.classList.add('active'); holdBtn.classList.remove('thinking');
      hint.textContent = '🔊 小鹏正在说...'; hint.classList.add('active');
      break;
  }
}

holdBtn.addEventListener('click', () => {
  if (!STATE.apiKey) { alert('请先填入 DeepSeek API Key'); return; }
  if (STATE.active) {
    STATE.active = false;
    try { STATE.recognition.abort(); STATE.recognition.stop(); } catch(e) {}
    speechSynthesis.cancel();
    STATE.listening = false; STATE.speaking = false;
    updateUI('idle');
  } else {
    if (typeof speechSynthesis !== 'undefined') {
      const unlock = new SpeechSynthesisUtterance(' ');
      unlock.volume = 0;
      speechSynthesis.speak(unlock);
    }
    STATE.active = true;
    updateUI('active');
    setTimeout(() => startListening(), 500);
  }
});
</script>
</body>
</html>
